name: Build ESP32 Base Image

on:
  workflow_dispatch:
  push:
    paths:
      - "services/esp32-compiler/Dockerfile.base"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/esp32-base

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./services/esp32-compiler
          file: ./services/esp32-compiler/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
